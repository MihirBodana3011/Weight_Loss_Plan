<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitOS" />
  <title>FitOS — 90-Day Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600&family=Oswald:wght@700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="app.css?v=1.1">
  <link rel="stylesheet" href="desktop.css" media="screen and (min-width: 1024px)">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="./icons/fitos_icon.png">
  <link rel="apple-touch-icon" href="./icons/fitos_icon.png">
  <script>
    // Hard Reset for PWA: Clear all caches and unregister SW one-time
    const REFRESH_VERSION = 'v12';
    if (localStorage.getItem('fitos_refresh_ver') !== REFRESH_VERSION) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (let reg of regs) reg.unregister();
        });
      }
      if ('caches' in window) {
        caches.keys().then(names => {
          for (let name of names) caches.delete(name);
        });
      }
      localStorage.setItem('fitos_refresh_ver', REFRESH_VERSION);
      setTimeout(() => location.reload(true), 500);
    }
  </script>
</head>

<body>
  <!-- ═══ SPLASH SCREEN (PREMIUM ADAPTOR) ═══ -->
  <div id="splash">
    <div class="splash-content">
      <div class="splash-title">FitOs</div>
      <div class="splash-loader">
        <div class="loader-bar"></div>
      </div>
      <div class="splash-status">LOADING NEURAL SYNC...</div>
    </div>
  </div>

  <div class="scanline"></div>
  <div class="bg-blobs">
    <div class="bg-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ═══ SETUP SCREEN ═══ -->
  <div id="setup">
    <div class="setup-box tilt-card">
      <div class="setup-header">
        <div class="setup-banner">FitOs</div>
        <div class="setup-sub">ELITE PERFORMANCE PROTOCOL</div>
      </div>
      

      <div class="form-group">
        <label class="form-label">PILOT NAME</label>
        <input class="form-input" id="s-name" type="text" placeholder="ENTER NAME..." autocomplete="off" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">CURRENT MASS (KG)</label>
          <input class="form-input" id="s-weight" type="number" placeholder="85" step="0.1" min="30" max="250" />
        </div>
        <div class="form-group">
          <label class="form-label">TARGET MASS (KG)</label>
          <input class="form-input" id="s-target-weight" type="number" placeholder="70" step="0.1" min="30" max="250" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">BIOLOGICAL AGE</label>
          <input class="form-input" id="s-age" type="number" placeholder="25" min="10" max="120" />
        </div>
        <div class="form-group">
          <label class="form-label">GENDER_ID</label>
          <select class="form-input custom-select" id="s-gender" aria-label="Gender selection">
            <option value="male">MALE</option>
            <option value="female">FEMALE</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">HEIGHT (CM)</label>
        <input class="form-input" id="s-height" type="number" placeholder="170" min="50" max="250" />
      </div>
      <div class="form-group">
        <label class="form-label">HYDRATION_QUOTA (GLASSES)</label>
        <input class="form-input" id="s-water-goal" type="number" placeholder="10" min="4" max="20" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">CURRENT BODY_FAT (%)</label>
          <input class="form-input" id="s-bodyfat" type="number" placeholder="20" step="0.1" min="3" max="50" />
        </div>
        <div class="form-group">
          <label class="form-label">PROTOCOL_MOOD</label>
          <select class="form-input custom-select" id="s-goal-mode">
            <option value="cut">SHRED (CUT)</option>
            <option value="bulk">MAINTAIN/GAIN (BULK)</option>
          </select>
        </div>
      </div>
      <button class="setup-btn haptic-press" onclick="setupSave()">⚡ INITIATE PROTOCOL</button>
      <!-- Setup info removed -->
    </div>
  </div>

  <!-- ═══ PWA INSTALL PROMPT ═══ -->
  <div id="pwa-install-banner" class="hidden-start">
    <div class="pwa-card">
      <div class="pwa-icon">📲</div>
      <div class="pwa-info">
        <div class="pwa-title">INSTALL FITOS</div>
        <div class="pwa-desc">Get 24/7 reminders & zero-lag workout GIFs</div>
      </div>
      <button class="pwa-btn haptic-press" id="btn-pwa-install">INSTALL</button>
      <div class="pwa-close" onclick="dismissPWA()">✕</div>
    </div>
  </div>

  <!-- ═══ APP ═══ -->
  <div id="app" class="hidden-start">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-branding">
          <div class="topbar-logo">FitOs</div>
        </div>
        <div class="topbar-date" id="topbar-date"></div>
      </div>
      <div class="day-badge" id="day-badge">DAY —</div>
    </div>

    <!-- Pages -->
    <div class="main" id="main-scroll">
      <div class="page active" id="page-home"></div>
      <div class="page" id="page-workout"></div>
      <div class="page" id="page-diet"></div>
      <div class="page" id="page-water"></div>
      <div class="page" id="page-progress"></div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="home">
        <div class="nav-icon">🏠</div>
        <div class="nav-label">Home</div>
      </button>
      <button class="nav-btn" data-page="workout">
        <div class="nav-icon">🏋️</div>
        <div class="nav-label">Train</div>
      </button>
      <button class="nav-btn" data-page="diet">
        <div class="nav-icon">🍱</div>
        <div class="nav-label">Diet</div>
      </button>
      <button class="nav-btn" data-page="water">
        <div class="nav-icon">💧</div>
        <div class="nav-label">Water</div>
      </button>
      <button class="nav-btn" data-page="progress">
        <div class="nav-icon">📈</div>
        <div class="nav-label">Progress</div>
      </button>
    </nav>
  </div>

  <div id="toast"></div>
  <div id="modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-box" id="modal-box"></div>
  </div>

  <script src="app.js?v=14" charset="UTF-8"></script>
</body>

</html>
